name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, develop, whatsapp-sync-fix]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Gradle wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl --fail --location --retry 3 \
              --output gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Validate sync configuration
        env:
          SYNC_API_URL: ${{ secrets.SYNC_API_URL }}
          SYNC_API_TOKEN: ${{ secrets.SYNC_API_TOKEN }}
        run: |
          for name in SYNC_API_URL SYNC_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required Actions secret: $name" >&2
              exit 1
            fi
          done

      - name: Print sync token digest for recovery
        env:
          SYNC_API_TOKEN: ${{ secrets.SYNC_API_TOKEN }}
        run: printf '%s' "$SYNC_API_TOKEN" | sha256sum | awk '{print "SYNC_API_TOKEN_SHA256=" $1}'

      - name: Test and build working debug APK
        env:
          SYNC_API_URL: ${{ secrets.SYNC_API_URL }}
          SYNC_API_TOKEN: ${{ secrets.SYNC_API_TOKEN }}
          APP_VERSION_CODE: ${{ github.run_number }}
          APP_VERSION_NAME: 1.1.${{ github.run_number }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean testDebugUnitTest assembleDebug --stacktrace

      - name: Verify debug APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          BUILD_TOOLS="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/aapt" dump badging "$APK" | head -n 1

      - name: Upload working APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-sync-working-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
