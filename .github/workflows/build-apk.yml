name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission to Gradle
      run: chmod +x ./gradlew

    - name: Build APK with detailed output
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "=== BUILD FAILED - Last 200 lines of output ==="
          tail -200 build.log
          exit 1
        fi

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log

    - name: Find APK files
      if: success()
      run: find app/build -name "*.apk" -type f

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: whatsapp-sync-debug
        path: app/build/outputs/apk/debug/
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          WhatsApp Sync Android APK
          
          Download the APK file to install on your Android device.
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/debug/app-debug.apk
        asset_name: whatsapp-sync-${{ github.ref }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Build Status
      if: always()
      run: |
        if [ ${{ job.status }} = "success" ]; then
          echo "✅ APK built successfully!"
          echo "📱 Download from: Actions > Build Android APK > whatsapp-sync-debug"
        else
          echo "❌ Build failed"
        fi
