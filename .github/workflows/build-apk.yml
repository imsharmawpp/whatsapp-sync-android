name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle Wrapper JAR
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          mkdir -p gradle/wrapper
          echo "Downloading Gradle 8.5 wrapper JAR..."
          cd gradle/wrapper
          # Try multiple sources
          curl -L -o gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" || \
          curl -L -o gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" || \
          (echo "Downloading full Gradle distribution..." && \
           cd /tmp && \
           curl -L -o gradle.zip "https://services.gradle.org/distributions/gradle-8.5-all.zip" && \
           unzip -q gradle.zip && \
           cp gradle-8.5/lib/gradle-wrapper.jar "${GITHUB_WORKSPACE}/gradle/wrapper/" && \
           rm -rf gradle-8.5 gradle.zip)
          cd "${GITHUB_WORKSPACE}"
          ls -lh gradle/wrapper/gradle-wrapper.jar
        fi

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        if [ $exit_code -ne 0 ]; then
          echo "Build failed with exit code $exit_code"
          tail -100 build.log
          exit $exit_code
        fi

    - name: Find APK files
      if: success()
      run: |
        echo "Searching for APK files..."
        find app/build -name "*.apk" -type f -exec ls -lh {} \;
        find app/build -name "*.apk" -type f > /tmp/apk_files.txt
        cat /tmp/apk_files.txt

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: whatsapp-sync-debug
        path: app/build/outputs/apk/debug
        retention-days: 30

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          WhatsApp Sync Android APK
          
          Download the APK file to install on your Android device.
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/debug/app-debug.apk
        asset_name: whatsapp-sync-${{ github.ref }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Build Status
      if: always()
      run: |
        if [ ${{ job.status }} = "success" ]; then
          echo "✅ APK built successfully!"
          echo "📱 Download from: Actions > Build Android APK > whatsapp-sync-debug"
        else
          echo "❌ Build failed"
        fi
