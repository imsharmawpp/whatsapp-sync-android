name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Restore Gradle wrapper JAR
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          curl --fail --location --retry 3 \
            --output gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        fi

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Test and build debug APK
      run: |
        chmod +x gradlew
        ./gradlew --no-daemon clean testDebugUnitTest assembleDebug --stacktrace

    - name: Verify debug APK
      run: test -s app/build/outputs/apk/debug/app-debug.apk

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: whatsapp-sync-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
